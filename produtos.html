<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos | VBS Soluções</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-menu"><img src="img/logo.png" alt="VBS"></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="produtos.html" class="active">Produtos</a>
            <a href="contato.html">Contato</a>
            <a href="download.html">Download</a>
            <a href="sobre.html">Sobre</a>
        </nav>
    </header>

    <main>
        <div class="titulo-secao">
            <h1>Nossa Vitrine</h1>
            <p>Encontre a melhor solução para sua segurança.</p>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Pesquisar por nome do produto...">
        </div>

        <div class="filter-container">
            <button class="filter-btn active" onclick="filtrarCategoria('todos')">Todos</button>
            <button class="filter-btn" onclick="filtrarCategoria('promocao')">🔥 Promoção</button>
            <button class="filter-btn" onclick="filtrarCategoria('cameras')">Câmeras</button>
            <button class="filter-btn" onclick="filtrarCategoria('portoes')">Portões</button>
            <button class="filter-btn" onclick="filtrarCategoria('rossi')">Rossi</button>
            <button class="filter-btn" onclick="filtrarCategoria('ppa')">PPA</button>
            <button class="filter-btn" onclick="filtrarCategoria('garen')">Garen</button>
        </div>

        <div id="vitrineGrid" class="vitrine-grid"></div>
    </main>

    <footer>
        <h3 style="letter-spacing: 2px;">VBS SOLUÇÕES</h3>
        <div class="footer-info">
            <p>Rua Rio Grande do Sul, 204 - Setor Norte 3 - Alta Floresta, MT</p>
            <p>© 2026 Todos os direitos reservados.</p>
        </div>
    </footer>

    <script>
        // ==========================================================
        //  PARTE FÁCIL: ADICIONE SEUS PRODUTOS AQUI ABAIXO
        // ==========================================================
        const produtos = [
            { id: '#00001', nome: 'Controle Remoto Rossi', foto: 'img/controle-rossi.png', preco: 'R$ 45,00', categoria: 'rossi', link: 'https://wa.me/p/6397304540314893/556684228702' },
            { id: '#00002', nome: 'Câmera Intelbras Dome', foto: 'img/camera-dome.png', preco: 'R$ 180,00', categoria: 'cameras', link: 'https://wa.me/p/6397304540314893/556684228702' },
            { id: '#00003', nome: 'Motor PPA DZ Rio 1/4', foto: 'img/motor-ppa.png', preco: 'R$ 550,00', categoria: 'ppa', link: 'https://wa.me/p/6397304540314893/556684228702' },
            { id: '#00004', nome: 'Kit Portão Garen Fit', foto: 'img/garen-fit.png', preco: 'R$ 499,00', categoria: 'garen promocao', link: 'https://wa.me/p/6397304540314893/556684228702' },
            // Basta copiar a linha acima e mudar os dados para adicionar mais!
        ];
        // ==========================================================

        const grid = document.getElementById('vitrineGrid');
        const searchInput = document.getElementById('searchInput');

        // Função para renderizar os produtos na tela
        function renderizarProdutos(lista) {
            grid.innerHTML = '';
            lista.forEach(prod => {
                grid.innerHTML += `
                    <div class="produto-item">
                        <span class="produto-id">${prod.id}</span>
                        <img src="${prod.foto}" alt="${prod.nome}" onerror="this.src='https://via.placeholder.com/200?text=Sem+Foto'">
                        <span class="produto-nome">${prod.nome}</span>
                        <span class="produto-preco">${prod.preco}</span>
                        <a href="${prod.link}" target="_blank" class="btn-adquirir"><i class="fa-brands fa-whatsapp"></i> ADQUIRIR AGORA</a>
                    </div>
                `;
            });
        }

        // Lógica de Busca
        searchInput.addEventListener('input', (e) => {
            const termo = e.target.value.toLowerCase();
            const filtrados = produtos.filter(p => p.nome.toLowerCase().includes(termo));
            renderizarProdutos(filtrados);
        });

        // Lógica de Filtro por Categoria
        function filtrarCategoria(cat) {
            // Atualiza botões
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if(cat === 'todos') {
                renderizarProdutos(produtos);
            } else {
                const filtrados = produtos.filter(p => p.categoria.includes(cat));
                renderizarProdutos(filtrados);
            }
        }

        // Inicializar a vitrine
        renderizarProdutos(produtos);
    </script>
</body>
</html>
