        const grid = document.getElementById('vitrineGrid');
        const searchInput = document.getElementById('searchInput');

        // Função para renderizar os produtos na tela
        function renderizarProdutos(lista) {
            grid.innerHTML = '';
            lista.forEach(prod => {
                grid.innerHTML += `
                    <div class="produto-item">
                        <span class="produto-id">${prod.id}</span>
                        <img src="${prod.foto}" alt="${prod.nome}" onerror="this.src='https://via.placeholder.com/200?text=Sem+Foto'">
                        <span class="produto-nome">${prod.nome}</span>
                        <span class="produto-preco">${prod.preco}</span>
                        <a href="${prod.link}" target="_blank" class="btn-adquirir"><i class="fa-brands fa-whatsapp"></i> ADQUIRIR AGORA</a>
                    </div>
                `;
            });
        }

        // Lógica de Busca
        searchInput.addEventListener('input', (e) => {
            const termo = e.target.value.toLowerCase();
            const filtrados = produtos.filter(p => p.nome.toLowerCase().includes(termo));
            renderizarProdutos(filtrados);
        });

        // Lógica de Filtro por Categoria
        function filtrarCategoria(cat) {
            // Atualiza botões
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if(cat === 'todos') {
                renderizarProdutos(produtos);
            } else {
                const filtrados = produtos.filter(p => p.categoria.includes(cat));
                renderizarProdutos(filtrados);
            }
        }

        // Inicializar a vitrine
        renderizarProdutos(produtos);
