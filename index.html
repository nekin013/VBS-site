<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VBS Soluções</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
overflow-x:hidden;
background:#e6e6e6;
}

/* HEXAGONOS */

.hex-bg{

position:fixed;
width:100%;
height:100%;

background:
linear-gradient(30deg,#dcdcdc 12%,transparent 12.5%,transparent 87%,#dcdcdc 87.5%,#dcdcdc),
linear-gradient(150deg,#dcdcdc 12%,transparent 12.5%,transparent 87%,#dcdcdc 87.5%,#dcdcdc),
linear-gradient(30deg,#dcdcdc 12%,transparent 12.5%,transparent 87%,#dcdcdc 87.5%,#dcdcdc),
linear-gradient(150deg,#dcdcdc 12%,transparent 12.5%,transparent 87%,#dcdcdc 87.5%,#dcdcdc),
linear-gradient(60deg,#ececec 25%,transparent 25.5%,transparent 75%,#ececec 75%,#ececec),
linear-gradient(60deg,#ececec 25%,transparent 25.5%,transparent 75%,#ececec 75%,#ececec);

background-size:80px 140px;

background-position:
0 0,
0 0,
40px 70px,
40px 70px,
0 0,
40px 70px;

z-index:-3;

}

/* MENU RETO */

header{

background:linear-gradient(90deg,#5fc0cf,#3d9fb3);

padding:18px;

display:flex;
justify-content:center;

position:relative;
z-index:5;

}

nav a{

color:white;
text-decoration:none;

margin:0 25px;

font-weight:bold;

letter-spacing:1px;

position:relative;

}

nav a::after{

content:"";

position:absolute;

width:0%;

height:2px;

background:white;

left:0;

bottom:-5px;

transition:0.3s;

}

nav a:hover::after{

width:100%;

}

/* AREA AZUL FLUIDA */

.hero{

position:relative;

height:420px;

display:flex;

justify-content:center;

align-items:center;

}

.blue-shape{

position:absolute;

top:0;

left:0;

width:100%;

height:100%;

background:linear-gradient(135deg,#6bc6d6,#2c8fa5);

clip-path: polygon(
0 0,
100% 0,
100% 70%,
90% 75%,
70% 68%,
50% 80%,
30% 70%,
10% 82%,
0 75%
);

z-index:-2;

}

/* BLOCO LOGO */

.logo-box{

background:rgba(255,255,255,0.55);

backdrop-filter:blur(14px);

padding:40px 70px;

border-radius:20px;

box-shadow:0 20px 40px rgba(0,0,0,0.15);

text-align:center;

}

.logo-box img{

width:220px;

}

.logo-box h2{

margin-top:15px;

color:#083a52;

}

/* CARDS */

.cards{

margin-top:80px;

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:35px;

padding-bottom:120px;

}

.card{

width:260px;

background:rgba(255,255,255,0.3);

backdrop-filter:blur(8px);

border-radius:15px;

padding:30px;

text-align:center;

color:#083a52;

box-shadow:0 10px 25px rgba(0,0,0,0.15);

transition:0.25s;

}

.card:hover{

transform:translateY(-7px);

}

.icon{

font-size:40px;

margin-bottom:10px;

}

</style>

</head>

<body>

<div class="hex-bg"></div>

<header>

<nav>

<a href="#">HOME</a>
<a href="#">PRODUTOS</a>
<a href="#">CONTATO</a>
<a href="#">DOWNLOAD</a>
<a href="#">SOBRE</a>

</nav>

</header>

<section class="hero">

<div class="blue-shape"></div>

<div class="logo-box">

<img src="logo.png">

<h2>Elétrica e Segurança Eletrônica</h2>

</div>

</section>

<section class="cards">

<div class="card">

<div class="icon">📷</div>

<h3>Câmeras</h3>

<p>Sistemas de monitoramento profissional.</p>

</div>

<div class="card">

<div class="icon">🚪</div>

<h3>Portões Automáticos</h3>

<p>Automação e controle remoto.</p>

</div>

<div class="card">

<div class="icon">🚨</div>

<h3>Alarmes</h3>

<p>Proteção residencial e empresarial.</p>

</div>

<div class="card">

<div class="icon">📶</div>

<h3>Controle via App</h3>

<p>Gerenciamento pelo celular.</p>

</div>

</section>

</body>
</html>
