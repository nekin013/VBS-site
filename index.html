<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>VBS Soluções</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
overflow-x:hidden;
background:#e5e5e5;
}

/* HEXAGONOS */

.hex{

position:absolute;
top:60px;
left:0;
width:100%;
height:260px;

background:
linear-gradient(30deg,#d8d8d8 12%,transparent 12.5%,transparent 87%,#d8d8d8 87.5%,#d8d8d8),
linear-gradient(150deg,#d8d8d8 12%,transparent 12.5%,transparent 87%,#d8d8d8 87.5%,#d8d8d8),
linear-gradient(30deg,#d8d8d8 12%,transparent 12.5%,transparent 87%,#d8d8d8 87.5%,#d8d8d8),
linear-gradient(150deg,#d8d8d8 12%,transparent 12.5%,transparent 87%,#d8d8d8 87.5%,#d8d8d8),
linear-gradient(60deg,#ececec 25%,transparent 25.5%,transparent 75%,#ececec 75%,#ececec),
linear-gradient(60deg,#ececec 25%,transparent 25.5%,transparent 75%,#ececec 75%,#ececec);

background-size:80px 140px;

background-position:
0 0,
0 0,
40px 70px,
40px 70px,
0 0,
40px 70px;

z-index:0;

}

/* MENU SUPERIOR */

header{

background:linear-gradient(90deg,#8ad0d6,#4da9bf);

padding:18px;

display:flex;
justify-content:center;

position:relative;
z-index:5;

}

nav a{

color:white;
text-decoration:none;

margin:0 30px;

font-weight:bold;

letter-spacing:1px;

position:relative;

}

nav a::after{

content:"";
position:absolute;
width:0%;
height:2px;
background:white;
left:0;
bottom:-5px;
transition:0.3s;

}

nav a:hover::after{

width:100%;

}

/* AREA HERO */

.hero{

position:relative;

height:380px;

display:flex;

justify-content:center;

align-items:center;

}

/* FORMA AZUL */

.blue{

position:absolute;

bottom:-60px;
left:0;

width:100%;
height:260px;

background:linear-gradient(#79c6d3,#5aaec2);

border-top-left-radius:120px;
border-top-right-radius:200px;

filter:blur(1px);

z-index:1;

}

/* CAIXA LOGO */

.logo-box{

position:relative;

background:rgba(255,255,255,0.65);

backdrop-filter:blur(14px);

padding:40px 70px;

border-radius:20px;

box-shadow:0 20px 40px rgba(0,0,0,0.15);

text-align:center;

z-index:3;

}

.logo-box img{

width:220px;

}

.logo-box h2{

margin-top:15px;

color:#083a52;

}

/* CARDS */

.cards{

margin-top:160px;

display:flex;

justify-content:center;

gap:40px;

flex-wrap:wrap;

padding-bottom:120px;

}

.card{

width:280px;

background:rgba(255,255,255,0.35);

backdrop-filter:blur(8px);

border-radius:20px;

padding:35px;

text-align:center;

color:white;

box-shadow:0 15px 30px rgba(0,0,0,0.15);

}

</style>

</head>

<body>

<header>

<nav>

<a href="#">HOME</a>
<a href="#">PRODUTOS</a>
<a href="#">CONTATO</a>
<a href="#">DOWNLOAD</a>
<a href="#">SOBRE</a>

</nav>

</header>

<div class="hex"></div>

<section class="hero">

<div class="logo-box">

<img src="logo.png">

<h2>Elétrica e Segurança Eletrônica</h2>

</div>

<div class="blue"></div>

</section>

<section class="cards">

<div class="card">

<h3>Lorem ipsum dolor</h3>

<p>sit amet, consectetur</p>

</div>

<div class="card">

<h3>Lorem ipsum dolor</h3>

<p>sit amet, consectetur</p>

</div>

</section>

</body>
</html>
