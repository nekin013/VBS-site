<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>VBS Soluções</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
overflow-x:hidden;
}

/* BACKGROUND HEXAGONOS */

.background{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:
url("background.png"),
radial-gradient(circle at 20% 30%, #e8e8e8, #dcdcdc);

background-size:cover;

z-index:-3;

}

/* FORMA AZUL FLUIDA */

.blue-wave{

position:absolute;
top:0;
left:0;

width:100%;
height:500px;

background:linear-gradient(135deg,#6bc6d6,#2c8fa5);

clip-path: polygon(
0 0,
100% 0,
100% 60%,
85% 70%,
65% 60%,
45% 75%,
25% 65%,
0 80%
);

z-index:-2;

}

/* MENU */

header{

display:flex;
justify-content:center;
padding:20px;
position:relative;
z-index:2;

}

nav a{

color:white;
text-decoration:none;
margin:0 25px;
font-weight:bold;
letter-spacing:1px;
position:relative;

}

nav a::after{

content:"";
position:absolute;
width:0%;
height:2px;
background:white;
left:0;
bottom:-5px;
transition:0.3s;

}

nav a:hover::after{

width:100%;

}

/* BLOCO DA LOGO */

.hero{

display:flex;
justify-content:center;
align-items:center;
height:350px;

}

.logo-box{

background:rgba(255,255,255,0.65);

backdrop-filter:blur(12px);

padding:40px 60px;

border-radius:20px;

box-shadow:0 20px 40px rgba(0,0,0,0.15);

text-align:center;

}

.logo-box img{

width:220px;

}

.logo-box h2{

margin-top:15px;
color:#0b3c4a;

}

/* CARDS */

.cards{

margin-top:80px;

display:flex;
justify-content:center;
flex-wrap:wrap;

gap:30px;

padding-bottom:100px;

}

.card{

width:260px;

background:rgba(255,255,255,0.25);

backdrop-filter:blur(8px);

border-radius:15px;

padding:30px;

text-align:center;

color:#083a52;

box-shadow:0 10px 25px rgba(0,0,0,0.15);

transition:0.3s;

}

.card:hover{

transform:translateY(-6px);

}

.icon{

font-size:40px;

margin-bottom:10px;

}

</style>

</head>

<body>

<div class="background"></div>

<div class="blue-wave"></div>

<header>

<nav>

<a href="#">HOME</a>
<a href="#">PRODUTOS</a>
<a href="#">CONTATO</a>
<a href="#">DOWNLOAD</a>
<a href="#">SOBRE</a>

</nav>

</header>

<section class="hero">

<div class="logo-box">

<img src="logo.png">

<h2>Elétrica e Segurança Eletrônica</h2>

</div>

</section>

<section class="cards">

<div class="card">

<div class="icon">📷</div>

<h3>Câmeras</h3>

<p>Sistemas completos de monitoramento.</p>

</div>

<div class="card">

<div class="icon">🚪</div>

<h3>Portões Automáticos</h3>

<p>Automação e controle remoto.</p>

</div>

<div class="card">

<div class="icon">🚨</div>

<h3>Alarmes</h3>

<p>Proteção para residências e empresas.</p>

</div>

<div class="card">

<div class="icon">📶</div>

<h3>Controle via App</h3>

<p>Controle remoto pelo celular.</p>

</div>

</section>

</body>
</html>
