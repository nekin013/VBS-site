<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>VBS Soluções</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#dcdcdc;
overflow-x:hidden;
}

/* HEXAGONOS */

.hex-bg{

position:absolute;
top:70px;
left:0;
width:100%;
height:180px;

background:
linear-gradient(30deg,#d0d0d0 12%,transparent 12.5%,transparent 87%,#d0d0d0 87.5%,#d0d0d0),
linear-gradient(150deg,#d0d0d0 12%,transparent 12.5%,transparent 87%,#d0d0d0 87.5%,#d0d0d0),
linear-gradient(30deg,#d0d0d0 12%,transparent 12.5%,transparent 87%,#d0d0d0 87.5%,#d0d0d0),
linear-gradient(150deg,#d0d0d0 12%,transparent 12.5%,transparent 87%,#d0d0d0 87.5%,#d0d0d0);

background-size:80px 140px;

background-position:
0 0,
0 0,
40px 70px,
40px 70px;

z-index:0;

}

/* MENU */

header{

background:linear-gradient(90deg,#7fc5cc,#4fa5ba);

height:70px;

display:flex;
align-items:center;
justify-content:center;

position:relative;
z-index:5;

}

/* remove qualquer linha estranha */

header::after{
display:none;
}

nav a{

color:white;
text-decoration:none;
margin:0 30px;
font-weight:bold;
letter-spacing:1px;
padding:10px 5px;
position:relative;

}

/* indicador de menu ativo */

nav a.active::after{

content:"";

position:absolute;

left:0;
bottom:-8px;

width:100%;
height:3px;

background:white;
border-radius:2px;

}

/* hover suave */

nav a:hover{

opacity:0.85;

}

/* HERO */

.hero{

position:relative;
height:320px;

display:flex;
justify-content:center;
align-items:flex-start;

padding-top:60px;

}

/* AREA AZUL */

.blue-area{

position:absolute;

top:120px;
left:0;

width:100%;
height:220px;

background:linear-gradient(#6fb8c6,#5ca8b9);

border-top-right-radius:140px;
border-top-left-radius:40px;

z-index:1;

}

/* LOGO */

.logo-box{

position:relative;

background:rgba(255,255,255,0.6);

backdrop-filter:blur(12px);

padding:45px 80px;

border-radius:20px;

box-shadow:0 15px 40px rgba(0,0,0,0.15);

text-align:center;

z-index:3;

}

.logo-box img{

width:280px; /* maior */

}

.logo-box h2{

margin-top:15px;
color:#123d4d;

}

/* CARDS */

.cards{

margin-top:140px;

display:flex;
justify-content:center;
gap:40px;

}

.card{

width:320px;

background:rgba(255,255,255,0.35);

backdrop-filter:blur(10px);

border-radius:20px;

padding:40px;

text-align:center;

color:white;

box-shadow:0 10px 30px rgba(0,0,0,0.2);

}

</style>

</head>

<body>

<header>

<nav>

<a class="active" href="#">HOME</a>
<a href="#">PRODUTOS</a>
<a href="#">CONTATO</a>
<a href="#">DOWNLOAD</a>
<a href="#">SOBRE</a>

</nav>

</header>

<div class="hex-bg"></div>

<section class="hero">

<div class="logo-box">

<img src="logo.png">

<h2>Elétrica e Segurança Eletrônica</h2>

</div>

<div class="blue-area"></div>

</section>

<section class="cards">

<div class="card">

<h3>Lorem ipsum dolor</h3>

<p>sit amet, consectetur</p>

</div>

<div class="card">

<h3>Lorem ipsum dolor</h3>

<p>sit amet, consectetur</p>

</div>

</section>

</body>
</html>
